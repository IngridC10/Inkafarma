<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gestión de Envíos</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: white;
  width: 800px;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
}

.line {
  height: 3px;
  background: #0b5d2a;
  margin: 15px 0 25px;
}

.filters {
  display: flex;
  justify-content: space-between;
  align-items: end;
  margin-bottom: 20px;
}

.group {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

select {
  padding: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
  width: 180px;
  height: 32px;
}

button {
  background: #0b5d2a;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

thead {
  background: #0b5d2a;
  color: white;
}

th, td {
  padding: 12px;
  text-align: left;
}

tbody tr {
  border-bottom: 1px solid #eee;
}

.actions a {
  margin-right: 10px;
  text-decoration: none;
  font-size: 18px;
}

.actions img {
  width: 22px;
  height: 22px;
  margin-right: 8px;
  cursor: pointer;
}

.pagination {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
  margin-top: 20px;
}

.pagination img {
  width: 18px;
  height: 18px;
  cursor: pointer;
}

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal:target {
  display: flex;
}

.modal-content {
  background: white;
  padding: 30px 35px;
  border-radius: 20px;
  width: 340px;
  position: relative;
}

.modal-title {
  text-align: center;
  font-weight: bold;
  font-size: 16px;
  margin: 0 0 4px;
}

.modal-subtitle {
  text-align: center;
  color: #999;
  font-size: 13px;
  margin: 0 0 24px;
}

.close {
  position: absolute;
  top: 14px;
  right: 18px;
  font-size: 20px;
  color: #555;
  text-decoration: none;
  line-height: 1;
}

.close:hover {
  color: #000;
}

/* Timeline */
.timeline {
  list-style: none;
  padding: 0;
  margin: 0;
}

.timeline li {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  position: relative;
  padding-bottom: 30px;
}

.timeline li:last-child {
  padding-bottom: 0;
}

/* Línea punteada entre pasos */
.timeline li:not(:last-child)::after {
  content: '';
  position: absolute;
  left: 19px;
  top: 42px;
  width: 2px;
  height: calc(100% - 10px);
  border-left: 2px dashed #ccc;
}

.step-icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.step-icon.completed {
  background: #0b5d2a;
  color: white;
}

.step-icon.in-progress {
  background: #f5c800;
  border: 4px solid #f5c800;
  box-shadow: inset 0 0 0 5px white;
}

.step-icon.delivered {
  background: #0b5d2a;
}

.step-text {
  padding-top: 6px;
}

.step-text strong {
  display: block;
  font-size: 14px;
  font-weight: 600;
}

.step-text span {
  font-size: 13px;
  color: #888;
}
</style>

</head>
<body>

<div class="card">
  <div style="display: flex; align-items: center; gap: 15px;">
  <img src="images/Inkafarma.png" alt="inkafarma-logo" style="width: 160px; height: auto;">
    <h2 style="margin: 0;">Gestión de Envíos</h2>
  </div>

  <div class="line"></div>

  <div class="filters">
    <div class="group">
      <label>Ciudad</label>
      <select>
        <option>Lima</option>
        <option>Trujillo</option>
      </select>
    </div>

    <div class="group">
      <label>Tipo de envío</label>
      <select>
        <option>Aéreo</option>
        <option>Terrestre</option>
      </select>
    </div>

    <button>Consultar</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Nro de Pedido</th>
        <th>Ciudad destino</th>
        <th>Tipo de envío</th>
        <th>Costo</th>
        <th>Acciones</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td>PEDD001</td>
        <td>Lima</td>
        <td>Aéreo</td>
        <td>s/500</td>
        <td class="actions">
          <img src="images/edit.png" alt="edit-icon">
          <img src="images/Delate.png" alt="delate-icon">
          <img src="images/Icon.png" alt="user-icon">
          <a href="#modal"><img src="images/Glass.png" alt="glass-icon"></a>
        </td>
      </tr>

      <tr>
        <td>PEDD002</td>
        <td>Trujillo</td>
        <td>Terrestre</td>
        <td>s/1000</td>
        <td class="actions">
          <img src="images/edit.png" alt="edit-icon">
             <img src="images/Delate.png" alt="delate-icon">
         <img src="images/Icon.png" alt="user-icon">
                  <a href="#modal"><img src="images/Glass.png" alt="glass-icon"></a>
         
          
        </td>
      </tr>
    </tbody>
  </table>

  <div class="pagination">
    <img src="images/Arrowleft.png" alt="anterior">
    1 de 1
    <img src="images/Arrowright.png" alt="siguiente">
  </div>
</div>


<div id="modal" class="modal">
  <div class="modal-content">
    <a href="#" class="close">&#x2715;</a>
    <p class="modal-title">Seguimiento de Pedido</p>
    <p class="modal-subtitle">(PED0001)</p>

    <ul class="timeline">
      <li>
        <div class="step-icon completed">&#10003;</div>
        <div class="step-text">
          <strong>Pedido despachado</strong>
          <span>15/03</span>
        </div>
      </li>
      <li>
        <div class="step-icon in-progress"></div>
        <div class="step-text">
          <strong>Pedido en tránsito</strong>
          <span>17/03</span>
        </div>
      </li>
      <li>
        <div class="step-icon in-progress"></div>
        <div class="step-text">
          <strong>Pedido en domicilio</strong>
          <span>18/03</span>
        </div>
      </li>
      <li>
        <div class="step-icon delivered"></div>
        <div class="step-text">
          <strong>Pedido entregado</strong>
          <span>19/03</span>
        </div>
      </li>
    </ul>
  </div>
</div>

</body>
</html>
